<html>
    <head>
        <title>V დავალება</title>
    </head>

    <body>
        <!--გადახედეთ CSS-ით გასტილვის სამივე მეთოდს, ახსენით სამივე და მოიყვანეთ სათითაო მაგალითები.-->
        <main>
            <!-- CSS-ის წერა შეგვიძლია სამი ტექნიკის გამოყენებით -->

            <!-- inline CSS ==> კოდს ვწერთ style ატრიბუტში ელემენტის გამხსნელ თეგში
            მაგ: <p style="color: red;">hello<p> -->

            <!-- internal CSS ==> ჩვენ CSS-ის კოდს ვწერთ HTML-ის ფაილში, head თეგში ვათავსებთ თეგს სახელად style და ამ თეგში ვიწყებთ CSS-ის 
            კოდის წერას -->

            <!-- external CSS ==> ჩვენ CSS-ის კოდს ვწერთ სრულიად ცალკე ფაილში (CSS-ისთვის განკუთვნილ ფაილში), რომელიც დაკავშირებულია ჩვენი 
            HTML-ის ფაილთან
            რომ დავაკავშირო CSS-ის ფაილი HTML-ში, head თეგში მჭირდება, რომ შევქმნა თეგი სახელად link და ამ თეგში href ატრიბუტში ჩავწერო იმ 
            ფაილის სახელი რაც ჰქვია ჩემს CSS-ის ფაილს -->
        </main>
    </body>
</html>
