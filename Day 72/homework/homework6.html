<html>
    <head>
        <title>VI დავალება</title>
        <link rel="stylesheet" href="homework6.css">
    </head>

    <body>
        <!--შექმენით ცხრილი - table თქვენს სასურველ თემაზე. table-ში გეწეროთ 4 ცალი tr. table-ს მიანიჭეთ სისქე bold, ფერი ვარდისფერი 
        (RGB), ზომა 30px, td-ს მიანიჭეთ ფონის ფერი ლურჯი და ზღვარი 2px solid ყვითელი (RGB).-->
        <main>
            <table border="2">
                <tr>
                    <td>1</td>
                    <td>2</td>
                    <td>3</td>
                </tr>

                <tr>
                    <td>4</td>
                    <td>5</td>
                    <td>6</td>
                </tr>

                <tr>
                    <td>7</td>
                    <td>8</td>
                    <td>9</td>
                </tr>

                <tr>
                    <td>0</td>
                    <td>+</td>
                    <td>-</td>
                </tr>
            </table>
        </main>
    </body>
</html>
