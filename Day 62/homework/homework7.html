<html>
    <head>
        <title>VII დავალება</title>
        <link rel="stylesheet" href="homework7.css">
    </head>

    <body>

        <!--შექმენით 1 dropdown მენიუ, სადაც იქნება 5 ქვეყნის სახელი ჩამოთვლილი, თითოეულ option ს მიეცი სხვადასხვა id და გასტილე 
        განსხვავებულად ყველა ელემენტი-->

        <main>
            <label for="countries">Choose a country:</label>
            <select name="countries" id="countries">
                <option value="Italy" id="italy">Italy</option>
                <option value="Germany" id="germany">Germany</option>
                <option value="France" id="france">France</option>
                <option value="Spain" id="spain">Spain</option>
                <option value="UK" id="uk">UK</option>
            </select>
        </main>
    </body>
</html>
