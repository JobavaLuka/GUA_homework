<html>
    <head>
        <title>X დავალება</title>
    </head>

    <body>
        <!--მოკლედ ჩამოწერეთ და ახსენით, გადაიმეორეთ და აუცილებლად დაიმახსოვრეთ 4 ყველაზე მნიშვნელონი ul დაულაგებელი სიის 
        list-style-type კუთვნილების მნიშვნელობები: disc, circle, square, none, და გადაიმეორეთ სხვა ყველაზე მნიშვნელონი ol 
        დალაგებული სიის list-style-type კუთვნილების მნიშვნელობებიც.-->
        <main>
            <!-- Unordered list (დაუნომრავი სია), თითოეულ ელემენტს წინ ექნება bullet-ები (წერტილები). -->
            <!-- Unordered list style types (სტილის ტიპები): disc, circle, square, none. -->
            <!-- list-style-type: disc; არის default (საწყისი) ფორმა ჩვენი სიის ელემენტების bullet-ებისა (წერტილებისა). -->
            <!-- list-style-type: circle; შეუცვლის ჩემ წერტილებს ფორმას და გახდება შიგნიდან ცარიელი. -->
            <!-- list-style-type: square; შეუცვლის ჩემს წერტილებს ფორმას და გახდება ოთხკუთხედი ფორმის. -->
            <!-- list-style-type: none; მოაშორებს სიის ელემენტებს bullet-ებს (ანუ წერტილებს). -->
        </main>
    </body>
</html>
