<html>
    <head>
        <title>II დავალება</title>
        <link rel="stylesheet" href="homework2.css">
    </head>

    <body>
        <!--შექმენით დალაგებული სია ყოველდღიური საქმიანობებისთვის, გასტილეთ list-style-type: decimal-leading-zero; კუთვნილებით, 
        ერთ-ერთ li თეგში ჩასვით დაულაგებელი სია ქვე-საქმიანობებისთვის და გასტილეთ list-style-type: circle; კუთვნილებით. თქვენს 
        სიებს გაუწერეთ ფერი, უკანა ფონის ფერი, ზღვარი, ტექსტის სისქე და ტექსტის ზომა.-->
        <main>
            <ol>
                <li>Get dressed</li>
                <li>Brush your teeth
                    <ul>
                        <li>Get your toothbrush</li>
                        <li>Apply toothpaste on the toothbrush</li>
                        <li>Brush in a circular motion for 3-5 minutes</li>
                        <li>Rinse your mouth with water</li>
                    </ul>
                </li>
                <li>Workout</li>
                <li>Eat your breakfast</li>
                <li>Go to school</li>
            </ol>
        </main>
    </body>
</html>
